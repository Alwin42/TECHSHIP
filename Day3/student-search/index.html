<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Students search</title>
    <style>
        body {
            background-color: aliceblue;
            font-family: sans-serif;
            text-align: center;
            padding-top: 50px;
        }
    </style>
</head>
<body>
    <h2>Student Search</h2>
    
    <input type="search" id="student-name" placeholder="Enter student name">
    <br><br>
    
    <button onclick="searchStudent()">Search</button>
    
    <h3>Search results:</h3>
    <p id="name"></p>
    <p id="index"></p>

    <script>
        function searchStudent() {
            let studentArray = ["alwin", "allen", "elna", "sivani"];
            let searchTerm = document.getElementById("student-name").value.toLowerCase();
            
            
            if (studentArray.includes(searchTerm)) {
                
                
                document.getElementById("name").innerHTML = "Name: " + searchTerm;
                
                
                let index = studentArray.indexOf(searchTerm);
                document.getElementById("index").innerHTML = "Index Number: " + index;
                
            } else {
                document.getElementById("name").innerHTML = "No student found.";
                document.getElementById("index").innerHTML = ""; 
            }
        }
    </script>
</body>
</html>
