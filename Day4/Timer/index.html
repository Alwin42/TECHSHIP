<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown Timer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 50px;
            background-color: #f4f4f9;
            color: #333;
        }

        .timer-container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            max-width: 350px;
            margin: auto;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        input {
            width: 60%;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
            margin-bottom: 15px;
            text-align: center;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background-color: #dc3545; /* Red button for the timer */
            color: white;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #c82333;
        }

        #timerDisplay {
            font-size: 60px;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            margin: 20px 0;
            color: #333;
        }
    </style>
</head>
<body>

    <div class="timer-container">
        <h2>Countdown Timer</h2>
        
        <input type="number" id="timeInput" placeholder="Enter seconds..." min="1">
        <br>
        <button onclick="startCountdown()">Start Timer</button>

        
        <div id="timerDisplay">00:00</div>
    </div>

    <script>
        // 1. We create this variable OUTSIDE the function so we can stop it later.
        // If we put it inside, we wouldn't be able to reach it to turn it off!
        let countdownInterval;

        function startCountdown() {
            // Get the number of seconds the user typed
            let totalSeconds = parseInt(document.getElementById("timeInput").value);

            // Validation: Make sure they entered a valid number greater than 0
            if (isNaN(totalSeconds) || totalSeconds <= 0) {
                alert("Please enter a valid number of seconds.");
                return;
            }

            // 2. Clear any existing timers! 
            // (If the user clicks "Start" twice, we don't want two timers running at the same time making it count twice as fast)
            clearInterval(countdownInterval);

            // Update the screen immediately before the 1-second delay starts
            updateScreen(totalSeconds);

            // 3. Start the loop
            countdownInterval = setInterval(function() {
                
                totalSeconds--; // Subtract 1 from the total seconds

                updateScreen(totalSeconds); // Update the visual display

                // 4. THE STOP CONDITION
                if (totalSeconds <= 0) {
                    clearInterval(countdownInterval); // Stops the loop!
                    document.getElementById("timerDisplay").innerText = "TIME'S UP!";
                }

            }, 1000); // Run this every 1000 milliseconds (1 second)
        }

        // Helper function to turn raw seconds into a nice MM:SS format
        function updateScreen(seconds) {
            // Math to calculate minutes and remaining seconds
            let minutes = Math.floor(seconds / 60);
            let remainingSeconds = seconds % 60;

            // Add a leading zero if the number is less than 10 (e.g., "09" instead of "9")
            if (minutes < 10) minutes = "0" + minutes;
            if (remainingSeconds < 10) remainingSeconds = "0" + remainingSeconds;

            // Push it to the HTML
            document.getElementById("timerDisplay").innerText = `${minutes}:${remainingSeconds}`;
        }
    </script>
</body>
</html>
