<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Student Cards</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f4f9; }
        
        
        .form-container { background: white; padding: 20px; border-radius: 8px; max-width: 300px; margin-bottom: 20px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        input { display: block; width: 90%; margin-bottom: 10px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { background-color: #007bff; color: white; border: none; padding: 10px 15px; cursor: pointer; border-radius: 4px; width: 100%; }
        button:hover { background-color: #0056b3; }

       
        #card-container { display: flex; flex-wrap: wrap; gap: 15px; }

        
        .student-card { background: white; border-left: 5px solid #007bff; padding: 15px; width: 250px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .student-card h3 { margin: 0 0 10px 0; color: #333; }
        .student-card p { margin: 5px 0; color: #555; }
        
        
        .delete-btn { background-color: #dc3545; color: white; border: none; padding: 5px 10px; margin-top: 10px; cursor: pointer; border-radius: 4px; font-size: 12px; }
    </style>
</head>
<body>

    <h2>Student ID Generator</h2>

    <div class="form-container">
        <input type="text" id="studentName" placeholder="Enter Name">
        <input type="text" id="courseName" placeholder="Enter Course">
        <input type="text" id="collegeName" placeholder="Enter College">
        <button onclick="generateCard()">Generate Card</button>
    </div>

    <div id="card-container"></div>

    <script>
        function generateCard() {
            
            let name = document.getElementById("studentName").value;
            let course = document.getElementById("courseName").value;
            let college = document.getElementById("collegeName").value;

            
            if (name === "" || course === "" || college === "") {
                alert("Please fill in all fields!");
                return; 
            }

            
            let newCard = document.createElement("div");
            
            
            newCard.className = "student-card"; 
            newCard.innerHTML = `
                <h3>${name}</h3>
                <p><strong>Course:</strong> ${course}</p>
                <p><strong>College:</strong> ${college}</p>
                <button class="delete-btn" onclick="this.parentElement.remove()">Delete Card</button>
            `;
            document.getElementById("card-container").appendChild(newCard);
            document.getElementById("studentName").value = "";
            document.getElementById("courseName").value = "";
            document.getElementById("collegeName").value = "";
        }
    </script>
</body>
</html>
