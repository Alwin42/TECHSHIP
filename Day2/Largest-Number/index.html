<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Largest Number</title>
</head>
<body>
    <div>
        <h2>Enter the numbers to find the largest</h2>
        <input type="number" id="number1" placeholder="First number">
        <input type="number" id="number2" placeholder="Second number">
        <input type="number" id="number3" placeholder="Third number">
        <br><br>
        
        <button onclick="findLargest()">Check</button>
        <p id="result"></p>
    </div>

    <script>
        function findLargest() {
            let num1 = Number(document.getElementById("number1").value) || 0;
            let num2 = Number(document.getElementById("number2").value) || 0;
            let num3 = Number(document.getElementById("number3").value) || 0;
            
            let largestNum;

            
            if (num1 >= num2 && num1 >= num3) {
                largestNum = num1;
            } else if (num2 >= num1 && num2 >= num3) {
                largestNum = num2;
            } else {
                largestNum = num3;
            }
            document.getElementById("result").innerHTML = "The largest number is " + largestNum;
        }
    </script>
</body>
</html>
