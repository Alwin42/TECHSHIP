<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Printing</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #ececec;
            padding: 20px;
        }
        button {
            padding: 10px 15px;
            margin: 5px;
            cursor: pointer;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:hover {
            background-color: #0056b3;
        }
        
        pre {
            background-color: white;
            padding: 20px;
            width: 200px;
            margin: 20px auto;
            border-radius: 8px;
            font-size: 24px;
            text-align: left;
            box-shadow: 0px 4px 8px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <h2>Pattern Printing System</h2>
    
    <button onclick="printPattern1()">Pattern 1 (*)</button>
    <button onclick="printPattern2()">Pattern 2 (Reverse *)</button>
    <button onclick="printPattern3()">Pattern 3 (123)</button>
    <button onclick="printPattern4()">Pattern 4 (222)</button>

    <pre id="patternResult">Click a button!</pre>

    <script>
       
        const display = document.getElementById("patternResult");

        // Pattern 1: Increasing Stars
        function printPattern1() {
            let result = "";
            for (let i = 1; i <= 5; i++) { 
                for (let j = 1; j <= i; j++) { 
                    result += "*";
                }
                result += "\n"; 
            }
            display.textContent = result;
        }

        // Pattern 2: Decreasing Stars
        function printPattern2() {
            let result = "";
            for (let i = 5; i >= 1; i--) { 
                for (let j = 1; j <= i; j++) { 
                    result += "*";
                }
                result += "\n";
            }
            display.textContent = result;
        }

        // Pattern 3: Increasing Numbers (1, 12, 123)
        function printPattern3() {
            let result = "";
            for (let i = 1; i <= 5; i++) { 
                for (let j = 1; j <= i; j++) {
                    
                    result += j;
                }
                result += "\n";
            }
            display.textContent = result;
        }

        // Pattern 4: Repeating Row Numbers (1, 22, 333)
        function printPattern4() {
            let result = "";
            for (let i = 1; i <= 5; i++) { 
                for (let j = 1; j <= i; j++) {
                   
                    result += i;
                }
                result += "\n";
            }
            display.textContent = result;
        }
    </script>
</body>
</html>
