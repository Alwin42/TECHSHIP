<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>String Analyzer</title>
    <script src="script.js"defer></script>
</head>
<body>
    <h1>String Analyzer</h1>
    <form>
        <label >Enter a String:</label>
        <input type="text" id="inputString">
        <button type="button" onclick="analyzeString()">Analyze</button>
    </form>
    <h2>Results:</h2>
    <p id="length"></p>
    <p id="Uppercase"></p>
    <p id="Lowercase"></p>
    <p id="CharacterCount"></p>

</body>
</html>
