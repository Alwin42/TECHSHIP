<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>
    <script src="script.js" defer></script> 
    <style>
        body{
            text-align:center;
        }
    </style>
</head>
<body>
    <h1> Shopping Cart </h1>
    
    <div style="background-color:rgb(255, 255, 255); display:flex; flex-direction:column; align-items:center; padding: 20px; width: 50%; margin: auto; border-radius: 10px;">
        <h2>Products</h2>
        <form >
        <input  style="margin:20px;" type="checkbox" id="product1Checkbox" name="product1Checkbox" value="Product 1"><label id="product1"></label><br>
        <input style="margin:20px;"  type="checkbox" id="product2Checkbox" name="product2Checkbox" value="Product 2"><label id="product2"></label><br>
        <input style="margin:20px;" type="checkbox" id="product3Checkbox" name="product3Checkbox" value="Product 3"><label id="product3"></label><br>
        </form>
        <button style="color:blue" onclick="TotalPrice()">Total Price</button>
        <h2>Total Price: $<span id="totalPrice">0.00</span></h2>
    </div>
</body>
</html>
